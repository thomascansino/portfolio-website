<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thomas Cansino - Web Developer</title>
    <link rel="stylesheet" href="styles.css">
    
  </head>
  <body>
    <div class="header-container">
      <header class="header-container-1">
        <a href="#hero" rel="nofollow">Home</a>
        <a href="#projects" rel="nofollow">Projects</a>
        <a href="#skills" rel="nofollow">Skills</a>
        <a href="#contact" rel="nofollow">Section</a>
      </header>
    </div>

    <div class="about-me-container">
      <div class="about-me-header-container">
        <h1 class="about-me-header">Hi, I'm Thomas👋</h1>
      </div>
      <p>I am Thomas Cansino, senior full stack web dev for a US startup company.</p>
      <img src="assets\cat.jpg" alt="description" class="about-image">
      <input type="button" value="Click Me!" id="button-id">
    </div>

    <div class="projects-container">
      <h1>PROJECTS</h1>
      <div>PROJECT 1</div>

      <div>HTML</div>
      <div>CSS</div>
      <div>JS</div>
    </div>

    <div class="contact-container">
      <h1>CONTACT</h1>

      <form action="/submit_page" class="form-container">
        <label for="fname">First name:</label>
        <input type="text" id="fname" name="fname">

        <label for="lname">Last name:</label>
        <input type="text" id="lname" name="lname">

        <input type="submit" value="Submit Form">
      </form>

    </div>

    <div class="footer-container">
      <h1>FOOTER</h1>
    </div>

    <script src="script.js"></script>

</html>
